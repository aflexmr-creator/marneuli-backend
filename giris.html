<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Oluştur - Marneuli Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 60px;
            height: 60px;
            background: #3b82f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .error-box {
            background: #dc2626;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .error-box.show { display: flex; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 18px;
        }
        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        input::placeholder { color: #64748b; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #2563eb; }
        .submit-btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .switch-text {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 14px;
        }
        .switch-text a {
            color: #3b82f6;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🏪</div>
        <h1 id="formTitle">Hesap Oluştur</h1>
        <p class="subtitle" id="formSubtitle">Marneuli Store'a katıl, alışverişe başla</p>
        
        <div class="error-box" id="errorBox">
            <span>⚠️</span>
            <span id="errorText">Sunucu hatası. Lütfen daha sonra tekrar deneyin.</span>
        </div>

        <!-- KAYIT FORMU -->
        <form id="signupForm">
            <div class="form-group">
                <label>Ad Soyad *</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="adSoyad" placeholder="Ad Soyad" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>E-posta *</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="email" placeholder="E-posta" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Telefon Numarası *</label>
                <div class="input-wrapper">
                    <span class="input-icon">📞</span>
                    <input type="tel" id="telefon" placeholder="Telefon Numarası" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Şifre *</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="sifre" placeholder="Şifre" required>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Kayıt Ol</button>
        </form>

        <!-- GİRİŞ FORMU -->
        <form id="loginForm" style="display: none;">
            <div class="form-group">
                <label>E-posta *</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="loginEmail" placeholder="E-posta" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Şifre *</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginSifre" placeholder="Şifre" required>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="loginBtn">Giriş Yap</button>
        </form>

        <p class="switch-text" id="switchText">
            Zaten hesabın var mı? <a onclick="toggleForm()">Giriş Yap</a>
        </p>
    </div>

    <script>
        let isLogin = false;

        function toggleForm() {
            isLogin = !isLogin;
            const signupForm = document.getElementById('signupForm');
            const loginForm = document.getElementById('loginForm');
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const switchText = document.getElementById('switchText');
            
            hideError();
            
            if (isLogin) {
                signupForm.style.display = 'none';
                loginForm.style.display = 'block';
                title.textContent = 'Giriş Yap';
                subtitle.textContent = 'Hesabına giriş yap';
                switchText.innerHTML = 'Hesabın yok mu? <a onclick="toggleForm()">Kayıt Ol</a>';
            } else {
                signupForm.style.display = 'block';
                loginForm.style.display = 'none';
                title.textContent = 'Hesap Oluştur';
                subtitle.textContent = 'Marneuli Store\'a katıl, alışverişe başla';
                switchText.innerHTML = 'Zaten hesabın var mı? <a onclick="toggleForm()">Giriş Yap</a>';
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorBox.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        // KAYIT OL
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const btn = document.getElementById('submitBtn');
            const adSoyad = document.getElementById('adSoyad').value;
            const email = document.getElementById('email').value;
            const telefon = document.getElementById('telefon').value;
            const sifre = document.getElementById('sifre').value;

            btn.disabled = true;
            btn.textContent = 'Kayıt yapılıyor...';

            try {
                const res = await fetch('https://marneuli-backend.onrender.com/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adSoyad, email, telefon, sifre })
                });

                const result = await res.json();

                if (res.ok) {
                    alert('Kayıt başarılı! Giriş yapabilirsiniz.');
                    toggleForm();
                } else {
                    showError(result.message || 'Kayıt başarısız');
                }
            } catch (err) {
                showError('Sunucu hatası. Backend uyuyor olabilir. 1dk bekleyip tekrar deneyin.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Kayıt Ol';
            }
        });

        // GİRİŞ YAP
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value;
            const sifre = document.getElementById('loginSifre').value;

            btn.disabled = true;
            btn.textContent = 'Giriş yapılıyor...';

            try {
                const res = await fetch('https://marneuli-backend.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, sifre })
                });

                const result = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', result.token);
                    window.location.href = 'index.html';
                } else {
                    showError(result.message || 'Giriş başarısız');
                }
            } catch (err) {
                showError('Sunucu hatası. Backend uyuyor olabilir. 1dk bekleyip tekrar deneyin.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Giriş Yap';
            }
        });
    </script>
</body>
</html>
