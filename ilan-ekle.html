<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Ekle - Marneuli Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
      .header {
            max-width: 700px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
      .header h1 {
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
      .header a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 12px 24px;
            border-radius: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
      .header a:hover {
            background: rgba(255,255,255,0.2);
        }
      .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
      .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #e0e0e0;
            font-size: 14px;
            font-weight: 500;
        }
        label i {
            margin-right: 8px;
            color: #8b5cf6;
        }
        input, textarea, select {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            font-size: 15px;
        }
        input::placeholder, textarea::placeholder {
            color: #888;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(0,0,0,0.4);
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
      .upload-area {
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
      .upload-area:hover {
            border-color: #8b5cf6;
            background: rgba(139,92,246,0.1);
        }
        #resimInput { display: none; }
        #preview {
            max-width: 100%;
            max-height: 350px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
      .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #8b5cf6, #6366f1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
      .btn-submit:hover { opacity: 0.9; }
      .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-plus-circle"></i> İlan Ekle</h1>
        <a href="index.html"><i class="fas fa-home"></i> Ana Sayfa</a>
    </div>

    <div class="container">
        <form id="ilanForm">
            <div class="form-group">
                <label><i class="fas fa-heading"></i> İlan Başlığı *</label>
                <input type="text" id="baslik" placeholder="Örn: iPhone 13 Pro Max 256GB" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Açıklama *</label>
                <textarea id="aciklama" placeholder="İlan detaylarını yazın..." required></textarea>
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> Fiyat (₾) *</label>
                <input type="number" id="fiyat" placeholder="0" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-list"></i> Kategori *</label>
                <select id="kategori">
                    <option value="Elektronik">📱 Elektronik</option>
                    <option value="Araba">🚗 Araba</option>
                    <option value="Ev Eşyası">🏠 Ev Eşyası</option>
                    <option value="Giyim">👕 Giyim</option>
                    <option value="Diğer">📦 Diğer</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-image"></i> İlan Fotoğrafı *</label>
                <div class="upload-area" onclick="document.getElementById('resimInput').click()">
                    <div id="uploadText">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 48px; margin-bottom: 10px; color: #8b5cf6;"></i>
                        <p style="font-size: 16px; margin-bottom: 5px;">Fotoğraf Yüklemek İçin Tıkla</p>
                        <small style="color: #aaa;">Max 5MB - JPG, PNG</small>
                    </div>
                    <input type="file" id="resimInput" accept="image/*">
                    <img id="preview" src="">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> Telefon Numaranız *</label>
                <input type="tel" id="telefon" placeholder="555 123 45 67" required>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fas fa-check"></i> İlanı Yayınla
            </button>
        </form>
    </div>

    <script>
        let base64Resim = '';

        // Giriş kontrolü - token yoksa login sayfasına at
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('İlan eklemek için giriş yapmalısınız!');
                window.location.href = 'giris.html';
            }
        };

        // Resim seçme ve önizleme
        document.getElementById('resimInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 5MB kontrolü
            if (file.size > 5 * 1024 * 1024) {
                alert('Resim 5MB\'dan büyük olamaz!');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                base64Resim = event.target.result;
                document.getElementById('preview').src = base64Resim;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('uploadText').innerHTML = '<i class="fas fa-check-circle" style="color:#10b981;font-size:48px;"></i><p style="font-size:16px;margin-top:10px;">Fotoğraf Yüklendi</p>';
            };
            reader.readAsDataURL(file);
        });

        // Form gönderme
        document.getElementById('ilanForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const baslik = document.getElementById('baslik').value;
            const aciklama = document.getElementById('aciklama').value;
            const fiyat = document.getElementById('fiyat').value;
            const kategori = document.getElementById('kategori').value;
            const telefon = document.getElementById('telefon').value;
            const token = localStorage.getItem('token');

            if (!baslik ||!aciklama ||!fiyat ||!telefon ||!base64Resim) {
                alert('Tüm alanları doldurun ve fotoğraf seçin!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Yayınlanıyor...';

            const ilan = {
                baslik,
                aciklama,
                fiyat: parseInt(fiyat),
                kategori,
                telefon,
                resim: base64Resim,
                tarih: new Date().toLocaleDateString('tr-TR'),
                id: Date.now()
            };

            try {
                const res = await fetch('https://marneuli-backend.onrender.com/api/ilanlar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify(ilan)
                });

                const result = await res.json();

                if (res.ok) {
                    alert('İlan başarıyla yayınlandı!');
                    window.location.href = 'index.html';
                } else {
                    alert('Hata: ' + result.message);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check"></i> İlanı Yayınla';
                }
            } catch (err) {
                alert('Sunucu hatası. Backend uyuyor olabilir. 50sn bekleyip tekrar deneyin.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> İlanı Yayınla';
            }
        });
    </script>
</body>
</html>
