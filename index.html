<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marneuli Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0e27;
            color: white;
            min-height: 100vh;
        }
      .navbar {
            background: #0f172a;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
        }
      .logo {
            font-size: 28px;
            font-weight: 700;
            color: #3b82f6;
        }
      .nav-buttons {
            display: flex;
            gap: 12px;
        }
      .btn {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
      .btn-primary {
            background: #3b82f6;
            color: white;
        }
      .btn-secondary {
            background: #1e293b;
            color: white;
        }
      .btn:hover { opacity: 0.8; }
      
      .search-container {
            max-width: 600px;
            margin: 40px auto 30px;
            position: relative;
        }
      .search-box {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
      .search-box:focus {
            outline: none;
            border-color: #3b82f6;
        }
      .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        
      .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            padding: 0 20px;
        }
      .tab {
            padding: 10px 24px;
            background: #1e293b;
            border: none;
            border-radius: 20px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
      .tab.active {
            background: #3b82f6;
            color: white;
        }
      .tab:hover {
            background: #334155;
        }
        
      .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 50px;
        }
      .ilanlar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
      .ilan-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #334155;
            cursor: pointer;
        }
      .ilan-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
        }
      .ilan-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #0f172a;
        }
      .ilan-body {
            padding: 20px;
        }
      .ilan-kategori {
            display: inline-block;
            background: #3b82f6;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 12px;
        }
      .ilan-baslik {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
      .ilan-fiyat {
            font-size: 22px;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 10px;
        }
      .ilan-aciklama {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 15px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
      .ilan-footer {
            border-top: 1px solid #334155;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #64748b;
            font-size: 13px;
        }
      .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }
      .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
      .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Marneuli Store</div>
        <div class="nav-buttons" id="navButtons">
            <a href="giris.html" class="btn btn-secondary"><i class="fas fa-user"></i> Giriş</a>
            <a href="ilan-ekle.html" class="btn btn-primary"><i class="fas fa-plus"></i> İlan Ekle</a>
        </div>
    </nav>

    <div class="search-container">
        <input type="text" class="search-box" id="searchInput" placeholder="iPhone, Araba, Ev ara...">
        <i class="fas fa-search search-icon"></i>
    </div>

    <div class="filter-tabs">
        <button class="tab active" data-kategori="Tümü">Tümü</button>
        <button class="tab" data-kategori="Elektronik">Elektronik</button>
        <button class="tab" data-kategori="Araba">Araç</button>
        <button class="tab" data-kategori="Emlak">Emlak</button>
        <button class="tab" data-kategori="Ev Eşyası">Ev Eşyası</button>
        <button class="tab" data-kategori="Giyim">Giyim</button>
        <button class="tab" data-kategori="Diğer">Diğer</button>
    </div>

    <div class="container">
        <div class="ilanlar-grid" id="ilanlarGrid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> İlanlar yükleniyor...</div>
        </div>
    </div>

    <script>
        let tumIlanlar = [];
        let aktifKategori = 'Tümü';
        let aramaMetni = '';

        // Sayfa yüklenince çalış
        window.onload = function() {
            kullaniciKontrol();
            ilanlariGetir();
            eventListeners();
        };

        // Giriş yapılmış mı kontrol et
        function kullaniciKontrol() {
            const token = localStorage.getItem('token');
            const navButtons = document.getElementById('navButtons');
            
            if (token) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                navButtons.innerHTML = `
                    <span style="color:#94a3b8;margin-right:10px;">
                        <i class="fas fa-user"></i> ${user.adSoyad || 'Kullanıcı'}
                    </span>
                    <a href="ilan-ekle.html" class="btn btn-primary"><i class="fas fa-plus"></i> İlan Ekle</a>
                    <button class="btn btn-secondary" onclick="cikisYap()"><i class="fas fa-sign-out-alt"></i></button>
                `;
            }
        }

        function cikisYap() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            location.reload();
        }

        // Backend'den ilanları çek
        async function ilanlariGetir() {
            try {
                const res = await fetch('https://marneuli-backend.onrender.com/api/ilanlar');
                tumIlanlar = await res.json();
                ilanlariGoster();
            } catch (err) {
                document.getElementById('ilanlarGrid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Sunucuya bağlanılamadı. Backend uyuyor olabilir.</p>
                    </div>
                `;
            }
        }

        // İlanları filtrele ve göster
        function ilanlariGoster() {
            const grid = document.getElementById('ilanlarGrid');
            
            // Filtreleme
            let filtrelenmis = tumIlanlar;
            
            if (aktifKategori !== 'Tümü') {
                filtrelenmis = filtrelenmis.filter(i => i.kategori === aktifKategori);
            }
            
            if (aramaMetni) {
                filtrelenmis = filtrelenmis.filter(i => 
                    (i.baslik || '').toLowerCase().includes(aramaMetni.toLowerCase()) ||
                    (i.aciklama || '').toLowerCase().includes(aramaMetni.toLowerCase())
                );
            }

            if (filtrelenmis.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-inbox"></i>
                        <p>İlan bulunamadı</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtrelenmis.map(ilan => `
                <div class="ilan-card" onclick="window.location.href='ilan-detay.html?id=${ilan.id}'">
                    <img src="${ilan.resim || 'https://via.placeholder.com/400x300?text=Resim+Yok'}" 
                         class="ilan-img" 
                         alt="${ilan.baslik || ''}"
                         onerror="this.src='https://via.placeholder.com/400x300?text=Resim+Yok'">
                    
                    <div class="ilan-body">
                        <span class="ilan-kategori">${ilan.kategori || 'Genel'}</span>
                        <h3 class="ilan-baslik">${ilan.baslik || 'Başlıksız İlan'}</h3>
                        <div class="ilan-fiyat">${ilan.fiyat ? ilan.fiyat + ' ₾' : 'Fiyat Belirtilmemiş'}</div>
                        <p class="ilan-aciklama">${ilan.aciklama || 'Açıklama eklenmemiş'}</p>
                        <div class="ilan-footer">
                            <span><i class="fas fa-phone"></i> ${ilan.telefon || 'Telefon Yok'}</span>
                            <span><i class="fas fa-calendar"></i> ${ilan.tarih || ''}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Event listeners
        function eventListeners() {
            // Kategori filtreleme
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    aktifKategori = this.dataset.kategori;
                    ilanlariGoster();
                });
            });

            // Arama
            document.getElementById('searchInput').addEventListener('input', function(e) {
                aramaMetni = e.target.value;
                ilanlariGoster();
            });
        }
    </script>
</body>
</html>
